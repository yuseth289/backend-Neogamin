services:
  postgres:
    image: 'postgres:17-alpine'
    environment:
      - 'POSTGRES_DB=neogaming'
      - 'POSTGRES_PASSWORD=neogaming_dev_password'
      - 'POSTGRES_USER=neogaming'
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U neogaming -d neogaming']
      interval: 10s
      timeout: 5s
      retries: 5
