server:
  port: ${PORT:8080}

spring:
  application:
    name: proyecto_formativo
  profiles:
    default: dev
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/neogaming}
    username: ${DB_USERNAME:neogaming}
    password: ${DB_PASSWORD:neogaming_dev_password}
    driver-class-name: org.postgresql.Driver
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}
            required: ${MAIL_SMTP_STARTTLS_REQUIRED:true}
          ssl:
            enable: ${MAIL_SMTP_SSL_ENABLE:false}
          connectiontimeout: ${MAIL_SMTP_CONNECTION_TIMEOUT:5000}
          timeout: ${MAIL_SMTP_TIMEOUT:5000}
          writetimeout: ${MAIL_SMTP_WRITE_TIMEOUT:5000}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  web:
    error:
      include-message: never

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_API_DOCS_ENABLED:true}
  swagger-ui:
    enabled: ${SPRINGDOC_SWAGGER_UI_ENABLED:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

app:
  cors:
    allowed-origins:
      - ${APP_CORS_ORIGIN_1:http://localhost:4200}
      - ${APP_CORS_ORIGIN_2:http://localhost:4000}
  security:
    jwt:
      secret: ${JWT_SECRET:dev-jwt-secret-change-me-123456789012}
      expiracion-minutos: ${JWT_EXPIRATION_MINUTES:120}
  notificacion:
    email-habilitado: ${APP_NOTIFICACION_EMAIL_HABILITADO:true}
    email-remitente: ${APP_NOTIFICACION_EMAIL_REMITENTE:neogaming2026@gmail.com}
