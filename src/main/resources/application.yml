spring:
  application:
    name: proyecto_formativo
  profiles:
    default: default
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/neogaming}
    username: ${DB_USERNAME:yuseth}
    password: ${DB_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  web:
    error:
      include-message: never

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_API_DOCS_ENABLED:true}
  swagger-ui:
    enabled: ${SPRINGDOC_SWAGGER_UI_ENABLED:true}

app:
  security:
    jwt:
      secret: ${JWT_SECRET:zga8uz7Ud7b2LB7teIRpyl7F7RQLdBgJ9AAH9Gy5YYacK7aF6jbGmKQdm7o60rSjSaCzVtkxsacFQqM2xIy8T}
      expiracion-minutos: ${JWT_EXPIRATION_MINUTES:120}
