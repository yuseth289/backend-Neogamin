spring:
  application:
    name: proyecto_formativo
  profiles:
    default: dev
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/neogaming}
    username: ${DB_USERNAME:neogaming}
    password: ${DB_PASSWORD:neogaming_dev_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  web:
    error:
      include-message: never

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_API_DOCS_ENABLED:true}
  swagger-ui:
    enabled: ${SPRINGDOC_SWAGGER_UI_ENABLED:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

app:
  cors:
    allowed-origins:
      - ${APP_CORS_ORIGIN_1:http://localhost:4200}
      - ${APP_CORS_ORIGIN_2:http://localhost:4000}
  security:
    jwt:
      secret: ${JWT_SECRET:change-this-dev-secret-before-deploying-neogaming}
      expiracion-minutos: ${JWT_EXPIRATION_MINUTES:120}
